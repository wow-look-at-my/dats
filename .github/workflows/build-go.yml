name: Build Go Binaries

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing the Go module
        type: string
        required: true
      output-name:
        description: Output binary name (without extension)
        type: string
        required: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.working-directory }}/go.mod

      - name: Check formatting
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::warning::Unformatted files: $unformatted"
          fi

      - name: Vet
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go vet ./...

      - name: Build
        run: |
          output="${{ inputs.output-name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          [[ "${{ matrix.goos }}" == "windows" ]] && output="${output}.exe"
          go build -o "$output" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output-name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ inputs.working-directory }}/${{ inputs.output-name }}-${{ matrix.goos }}-${{ matrix.goarch }}*

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.working-directory }}/go.mod

      - run: go test -cover ./...

  all-checks-passed:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed"
