name: CI

on:
  push:
  workflow_dispatch:
    inputs:
      release:
        description: Create a release
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: wow-look-at-my/go-toolchain@v1

      - name: Remove symlinks from build output
        run: find build -type l -delete

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: build/dats_*

  release:
    if: github.ref == 'refs/heads/master' || inputs.release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$(date +%Y%m%d.%H%M%S)"
          gh release create "$tag" artifacts/* \
            --repo "${{ github.repository }}" \
            --title "$tag" \
            --notes "Automated release from commit ${{ github.sha }}"
