name: CI

on:
  push:
  workflow_dispatch:
    inputs:
      release:
        description: Create a release
        type: boolean
        default: false

jobs:
  build-go:
    uses: ./.github/workflows/build-go.yml
    with:
      output-name: dats

  build-vscode:
    uses: ./.github/workflows/build-vscode.yml
    with:
      working-directory: src/vscode-dats
      output-name: dats

  release:
    if: github.ref == 'refs/heads/master' || inputs.release
    needs: [build-go, build-vscode]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$(date +%Y%m%d.%H%M%S)"
          gh release create "$tag" artifacts/* \
            --repo "${{ github.repository }}" \
            --title "$tag" \
            --notes "Automated release from commit ${{ github.sha }}"
